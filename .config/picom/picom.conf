#################################
# Backend
#################################
backend = "glx";
vsync = true;

#################################
# Rendimiento
#################################
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;

#################################
# Esquinas redondeadas
#################################
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Sombras
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.30;
shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Transparencias
#
# Filosofía: todo es opaco por defecto.
# Solo las terminales y Rofi tienen transparencia — y siempre,
# no dependiente del foco, para evitar parpadeos en streaming.
#
# NO se usa inactive-opacity global porque afecta
# cualquier ventana que pierda foco (feh, vlc, browsers, etc.)
#################################
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "95:class_g = 'Alacritty'",
  "85:class_g = 'kitty'",
  "95:class_g = 'Xterm'",
  "95:class_g = 'URxvt'",
  "85:class_g = 'Rofi'"
];

#################################
# Blur
#
# Solo se aplica a terminales y Rofi.
# Cualquier ventana de tipo normal (vlc, feh, browsers,
# viewers) queda excluida automáticamente por window_type.
#################################
blur-method = "dual_kawase";
blur-strength = 3;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  # Tipos de ventana que nunca deben tener blur
  "window_type = 'normal'",
  "window_type = 'dialog'",
  "window_type = 'utility'",
  "window_type = 'splash'"
];

# Devolver blur solo a terminales y Rofi
# (override — se evalúa después de los excludes)
# Nota: en picom moderno los excludes tienen prioridad,
# así que manejamos al revés: excluimos todo y dejamos
# solo lo que queremos con una regla positiva más específica.
# La forma correcta es NO excluir por window_type=normal
# y en cambio excluir todo excepto terminales/Rofi:

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  # Excluir del blur a todo lo que NO sea terminal/Rofi
  # usando negación: si NO es Alacritty/kitty/Rofi => exclude
  "!(class_g = 'Alacritty' || class_g = 'kitty' || class_g = 'Rofi' || class_g = 'Xterm' || class_g = 'URxvt')"
];

#################################
# Fullscreen / Video
# unredir desactiva picom completamente para esa ventana
# en fullscreen — máximo rendimiento para vlc, mpv, juegos
#################################
unredir-if-possible = true;
unredir-if-possible-delay = 500;
unredir-if-possible-exclude = [
  "class_g = 'Firefox'",
  "class_g = 'Chromium'"
];

#################################
# Fading
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

#################################
# Sync
#################################
xrender-sync-fence = true;
