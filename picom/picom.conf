#################################
# Backend
#################################
backend = "glx";
vsync = true;

#################################
# Rendimiento
#################################
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;

#################################
# Esquinas redondeadas
#################################
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Sombras
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.30;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Transparencias
#################################
inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
  "95:class_g = 'Alacritty'",
  "95:class_g = 'kitty'",
  "90:class_g = 'Rofi'"
];

#################################
# Fading
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

#################################
# Blur (ligero)
#################################
blur-method = "dual_kawase";
blur-strength = 3;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Fullscreen / Video
#################################
unredir-if-possible = true;

unredir-if-possible-exclude = [
  "class_g = 'Firefox'",
  "class_g = 'Chromium'"
];

#################################
# Sync
#################################
xrender-sync-fence = true;
