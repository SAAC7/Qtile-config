# ==============================================================================
# /etc/tlp.conf — Configuración universal gaming
# Compatible: Intel / AMD | Laptop / Desktop | Arch Linux
# Optimizado para: rendimiento en AC, ahorro en BAT
# Generado para uso con: cpupower + gamemode + gaming-profile.sh
# ==============================================================================

# ------------------------------------------------------------------------------
# GENERAL
# ------------------------------------------------------------------------------

TLP_ENABLE=1
TLP_WARN_LEVEL=3

# En desktop no hay batería, TLP simplemente opera siempre en modo AC
# En laptop alterna automáticamente según la fuente de alimentación
TLP_DEFAULT_MODE=AC
TLP_PERSISTENT_DEFAULT=0

# ------------------------------------------------------------------------------
# CPU — Governor y política de energía
# Compatible con intel_pstate, amd-pstate y acpi-cpufreq
# ------------------------------------------------------------------------------

# Governor
# - performance: máximo rendimiento constante (AC / gaming)
# - schedutil:   balance dinámico (BAT / uso normal)
# - powersave:   mínimo consumo (BAT / reposo)
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=schedutil

# Política EPP (Energy Performance Preference)
# Intel Core 6th gen+ y AMD Zen2+ con amd-pstate-epp
# Si tu CPU no lo soporta, TLP lo ignora silenciosamente
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

# Turbo Boost (Intel) / Core Performance Boost (AMD)
# En AC siempre permitido, en BAT desactivado para reducir calor y consumo
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# Dynamic boost — mejora rendimiento en tareas con I/O intensivo
# Solo Intel Core 6th gen+ con intel_pstate activo; ignorado en AMD/otros
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=0

# Límite de rendimiento en BAT (% del máximo disponible)
# Evita que el CPU corra a tope innecesariamente con batería
# Comenta estas líneas si usas solo desktop
CPU_MIN_PERF_ON_BAT=0
CPU_MAX_PERF_ON_BAT=60

# Driver operation mode
# AMD Zen2+ con kernel 6.3+: active (amd-pstate-epp) o passive (amd-pstate)
# Intel con intel_pstate: active o passive
# Descomenta si quieres forzar un modo; si no, el kernel decide
#CPU_DRIVER_OPMODE_ON_AC=active
#CPU_DRIVER_OPMODE_ON_BAT=active

# ------------------------------------------------------------------------------
# PLATFORM PROFILE
# Controla perfil térmico/ventilador del sistema (si el hardware lo soporta)
# Verifica disponibilidad con: tlp-stat -p
# ------------------------------------------------------------------------------

PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power

# ------------------------------------------------------------------------------
# PCIe — Active State Power Management (ASPM)
# En desktop: performance no cambia nada visible pero es más seguro
# En laptop: powersupersave ahorra batería significativamente
# ------------------------------------------------------------------------------

PCIE_ASPM_ON_AC=performance
PCIE_ASPM_ON_BAT=powersupersave

# ------------------------------------------------------------------------------
# DISCO — Detección automática
# TLP detecta nvme0n1, sda, etc. automáticamente si no se especifica nada
# APM level: 254=sin ahorro (AC), 128=ahorro moderado (BAT), 255=off
# ------------------------------------------------------------------------------

# No forzamos DISK_DEVICES para que TLP detecte el hardware automáticamente
# Si quieres fijarlo manualmente descomenta y ajusta:
#DISK_DEVICES="nvme0n1 sda"

DISK_APM_LEVEL_ON_AC=254
DISK_APM_LEVEL_ON_BAT=128

# Excluir USB e IEEE1394 del APM (previene corrupción de datos)
DISK_APM_CLASS_DENYLIST="usb ieee1394"

# Scheduler de I/O — mq-deadline es el más recomendado para gaming/NVMe
# 'keep' respeta el default del kernel si no reconoce el disco
#DISK_IOSCHED="mq-deadline keep"

# ------------------------------------------------------------------------------
# RUNTIME PM — Gestión de energía de dispositivos PCIe en tiempo real
# IMPORTANTE: en AC se deja todo encendido para no afectar GPU/sonido
# ------------------------------------------------------------------------------

RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# Excluir drivers críticos del Runtime PM en BAT
# Incluye amdgpu para no suspender GPU AMD mientras hay actividad
RUNTIME_PM_DRIVER_DENYLIST="mei_me nouveau radeon amdgpu xhci_hcd"

# ------------------------------------------------------------------------------
# AUDIO — Sin ahorro en AC para evitar crackling/latencia en juegos
# ------------------------------------------------------------------------------

SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# ------------------------------------------------------------------------------
# Wi-Fi — Sin ahorro en AC, ahorro moderado en BAT
# ------------------------------------------------------------------------------

WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# Wake-on-LAN desactivado (innecesario para gaming, consume energía)
WOL_DISABLE=Y

# ------------------------------------------------------------------------------
# USB — Autosuspend desactivado globalmente
# Evita que controllers, headsets o periféricos de gaming se suspendan
# ------------------------------------------------------------------------------

USB_AUTOSUSPEND=0

# Si prefieres autosuspend activado pero con excepciones, comenta la línea
# anterior y usa USB_DENYLIST con los IDs de tus periféricos (lsusb para verlos)
#USB_AUTOSUSPEND=1
#USB_DENYLIST="045e:02ea 054c:05c4"   # ejemplo: Xbox controller, DualShock 4

# ------------------------------------------------------------------------------
# BATERÍA — Umbrales de carga (solo laptop)
# Protege la vida útil de la batería limitando la carga máxima
# En desktop estos parámetros se ignoran completamente
#
# Recomendación:
#   - Laptop de escritorio (siempre conectada): start=20 stop=60
#   - Laptop móvil (uso mixto):                 start=20 stop=80
#   - Sin restricción (máxima autonomía):       comenta ambas líneas
#
# NOTA: Solo funciona con hardware compatible (ThinkPad, ASUS, Huawei, etc.)
# Verifica soporte con: tlp-stat -b
# ------------------------------------------------------------------------------

START_CHARGE_THRESH_BAT0=20
STOP_CHARGE_THRESH_BAT0=80

# Batería secundaria (si existe — ThinkPads con slice battery, etc.)
#START_CHARGE_THRESH_BAT1=20
#STOP_CHARGE_THRESH_BAT1=80

# ------------------------------------------------------------------------------
# SUSPEND — Modo de suspensión del sistema
# s2idle: ligero, rápido pero consume más en espera
# deep:   suspende a RAM, mayor ahorro pero más lento al despertar
# PRECAUCIÓN: cambiar esto puede causar inestabilidad en algunos equipos
# Verifica modos disponibles con: tlp-stat -s
# ------------------------------------------------------------------------------

#MEM_SLEEP_ON_AC=s2idle
#MEM_SLEEP_ON_BAT=deep

# ------------------------------------------------------------------------------
# NMI WATCHDOG — Desactivado para ahorrar ciclos de CPU
# Solo actívalo si necesitas debug del kernel
# ------------------------------------------------------------------------------

NMI_WATCHDOG=0
